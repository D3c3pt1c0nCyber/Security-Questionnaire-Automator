name: Secret & Security Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # --------------------------------------------------------
  # 1. TRUFFLEHOG — scans entire git history for leaked secrets
  # --------------------------------------------------------
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

  # --------------------------------------------------------
  # 2. DETECT-SECRETS — pattern-based secret detection
  # --------------------------------------------------------
  detect-secrets:
    name: Detect Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets
        run: |
          detect-secrets scan \
            --exclude-files '\.env\.example$' \
            --exclude-files 'package-lock\.json$' \
            --exclude-files '\.gitkeep$' \
            > .secrets.baseline.tmp

          # Fail if any real secrets found (not just empty results)
          python3 - << 'PYEOF'
          import json, sys
          with open('.secrets.baseline.tmp') as f:
              data = json.load(f)
          results = data.get('results', {})
          if results:
              print("SECRETS DETECTED:")
              for path, findings in results.items():
                  for finding in findings:
                      print(f"  {path}:{finding.get('line_number')} — {finding.get('type')}")
              sys.exit(1)
          else:
              print("No secrets detected.")
          PYEOF

  # --------------------------------------------------------
  # 3. DEPENDENCY AUDIT — checks for known vulnerabilities
  # --------------------------------------------------------
  audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: app
        run: npm install

      - name: Run npm audit
        working-directory: app
        run: npm audit --audit-level=high
