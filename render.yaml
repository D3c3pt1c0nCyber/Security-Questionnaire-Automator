services:
  - type: web
    name: security-qa
    runtime: node
    rootDir: app
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ATLASSIAN_BASE
        sync: false
      - key: ATLASSIAN_EMAIL
        sync: false
      - key: ATLASSIAN_TOKEN
        sync: false
